; ============================================================
; CacaOS - PlatformIO configuration
; Target: ESP32-2432S028R (Cheap Yellow Display)
; ============================================================

[env:cyd]
platform        = espressif32@^6.7.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 460800

board_build.partitions       = huge_app.csv
board_build.filesystem       = littlefs
board_build.f_cpu            = 240000000L
board_build.f_flash          = 80000000L
board_build.flash_mode       = qio

; Exclude the desktop simulator sources from the device build.
build_src_filter =
    +<*>
    -<sim/>

lib_deps =
    lvgl/lvgl@^9.2.0
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#v1.4
    bblanchon/ArduinoJson@^7.1.0

build_flags =
    ; --- TFT_eSPI display config for ILI9341 on CYD ---
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    ; --- LVGL config include ---
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    ; --- Logging level: 0 silent, 5 verbose. Bump to 3 during dev ---
    -D CORE_DEBUG_LEVEL=3
    ; --- C++ standard ---
    -std=gnu++17
    -Wno-unused-function
    -Wno-unused-variable

build_unflags =
    -std=gnu++11

; ============================================================
; Native simulator env (LVGL + SDL2 on macOS / Linux)
; ============================================================
; Build:  pio run -e sim
; Run:    pio run -e sim -t exec
; Deps:   brew install sdl2
;
; Replaces hardware modules with desktop shims; the apps (and UI) build
; unchanged. See src/sim/ and SETUP.md for details.
; ============================================================
[env:sim]
platform        = native

lib_deps =
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.1.0

build_src_filter =
    +<*>
    -<system/display.cpp>
    -<system/touch.cpp>
    -<system/sdcard.cpp>
    -<system/storage.cpp>
    -<system/wifi_mgr.cpp>
    -<system/weather.cpp>
    -<system/rgb_led.cpp>
    -<system/ldr.cpp>
    -<apps/wifi_config/wifi_config.cpp>
    -<apps/file_drop/file_drop.cpp>
    -<main.cpp>

build_flags =
    ; Mark sim build for ifdefs (lv_conf.h, etc.)
    -D CACAOS_SIM=1
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    ; src/sim/include provides Arduino.h, SD.h, Preferences.h, ... shims
    -I src/sim/include
    ; SDL2 (Homebrew on Apple Silicon installs to /opt/homebrew)
    -I /opt/homebrew/include
    -I /usr/local/include
    -L /opt/homebrew/lib
    -L /usr/local/lib
    -lSDL2
    -std=gnu++17
    -Wno-unused-function
    -Wno-unused-variable
    -Wno-unused-parameter
    -Wno-write-strings

build_unflags =
    -std=gnu++11

