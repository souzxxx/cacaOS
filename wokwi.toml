# Wokwi simulator config — points to the firmware that PlatformIO builds.
# Use with the "Wokwi for VS Code" extension: F1 -> "Wokwi: Start Simulator".
#
# Prereq:
#   pio run -e cyd           # builds .pio/build/cyd/firmware.{bin,elf}
#
# The simulator emulates ESP32 + ILI9341 (display+touch) + microSD per
# the CYD pinout in PLAN.md.
[wokwi]
version = 1
firmware = ".pio/build/cyd/firmware.bin"
elf = ".pio/build/cyd/firmware.elf"
